# Nutshell Configuration
# Copy this to ~/.config/nutshell/config.toml and update with your settings

# Provider configs
[provider.ollama-fast]
api_key = "ollama"
base_url = "http://localhost:11434/v1"
max_context = 8192
model = "qwen3.5-0.8B"
temperature = 0.7
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
chat_template_kwargs = { enable_thinking = false }

[provider.ollama-reasoning]
api_key = "ollama"
base_url = "http://localhost:11434/v1"
max_context = 8192
model = "qwen3.5-27B"
temperature = 0.3
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
chat_template_kwargs = { enable_thinking = true }

[provider.openrouter]
api_key = "your-openrouter-api-key"
base_url = "https://openrouter.ai/api/v1"
max_context = 262144
model = "xiaomi/mimo-v2-flash"
temperature = 0.7
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
provider = { sort = "latency" }

# Role definitions
[role.default]
uses = "ollama-reasoning"

[role.quick]
uses = "ollama-fast"

[role.deep]
uses = "openrouter"
options = { provider = { sort = "price" } }

[role.agent]
uses = "openrouter"
on_overflow = "Input too large. Use head/tail to page through the text or grep for specific patterns."
on_error = "Failed to summarize. Use another tool."
options = { temperature = 0.3 }

# Fetcher configs
[fetchers.jina]
enabled = false
api_key = ""
