# Nutshell Configuration
# Copy this to ~/.config/nutshell/config.toml and update with your settings

[provider.openai]
api_key = "your-api-key-here"
base_url = "https://api.openai.com/v1"
max_context = 128000
model = "gpt-4"
temperature = 0.7
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0

[provider.openai-quick]
api_key = "your-api-key-here"
base_url = "https://api.openai.com/v1"
max_context = 4000
model = "gpt-3.5-turbo"
temperature = 0.5
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0

[provider.openai-deep]
api_key = "your-api-key-here"
base_url = "https://api.openai.com/v1"
max_context = 128000
model = "gpt-4"
temperature = 0.2
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0

[provider.ollama-fast]
api_key = "ollama"
base_url = "http://localhost:11434/v1"
max_context = 8192
model = "llama2"
temperature = 0.7
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
chat_template_kwargs = { enable_thinking = false }

[provider.ollama-reasoning]
api_key = "ollama"
base_url = "http://localhost:11434/v1"
max_context = 8192
model = "llama2"
temperature = 0.3
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
chat_template_kwargs = { enable_thinking = true }

[provider.openrouter]
api_key = "your-openrouter-api-key"
base_url = "https://openrouter.ai/api/v1"
max_context = 128000
model = "anthropic/claude-3.5-sonnet"
temperature = 0.7
top_p = 1.0
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
provider = { sort = "throughput" }

[role.default]
uses = "openai"

[role.quick]
uses = "openai-quick"

[role.deep]
uses = "openai-deep"

[role.local]
uses = "ollama-fast"

[role.local-thinking]
uses = "ollama-reasoning"

[role.openrouter-latency]
uses = "openrouter"
options = { provider = { sort = "latency" } }

[fetchers.jina]
enabled = false
api_key = ""
